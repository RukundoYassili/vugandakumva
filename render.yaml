services:
  - type: web
    name: vugandakumva
    env: node
    buildCommand: npm install && npm --prefix client install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OLLAMA_ENABLED
        value: "false"
